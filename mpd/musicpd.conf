###################################
#
#  FreeBSD specific musicpd.conf (uses /dev/dsp0)
#
#

follow_inside_symlinks  "yes"
db_file         "/var/mpd/mpd.db"
log_file        "/var/mpd/mpd.log"
pid_file        "/var/mpd/pid"
music_directory         "/media/USBHD2/musica"
# playlist_directory      "/var/mpd/playlists"
state_file      "/var/mpd/mpdstate"
user    "mpd"
bind_to_address         "0.0.0.0"
port    "6600"
log_level       "default"
volume_normalization    "no"
audio_buffer_size       "16384"
filesystem_charset      "UTF-8"
auto_update     "no"
mixer_type      "disabled"
group   "mpd"
max_connections "20"
restore_paused "yes"

resampler {
  plugin "soxr"
  quality "very high"
}

# Output 1 — direct to DAC, no room correction
audio_output {
        type "oss"
        name "OKTO-DAC"
        device "/dev/dsp0"
        mixer_type        "none"
}

# Native DRC output — brutefir loopback, no MPD format conversion.
#
# drc.sh <position> <rate> restarts virtual_oss and brutefir at the selected
# sample rate, then enables this output.  The selected rate must match the
# source track rate for native playback.
#
# MPD's "format" syntax is sample_rate:bits:channels.  An asterisk means that
# the attribute is not enforced.  Therefore "*:*:*" means:
#   * keep the source sample rate
#   * keep the source bit depth
#   * keep the source channel count
#
# This is intentional: setting "44100:24:2" or similar would force MPD to
# convert to that format.  For native DRC, 44.1 kHz / 16-bit and 44.1 kHz /
# 24-bit sources both use this same output; the bit depth is not the routing
# selector.

audio_output {
        type "oss"
        name "DRC-native"
        device "/dev/dsp.play"
        format "*:*:*"
        enabled "no"
        mixer_type        "none"
}

# DRC-resamp: MPD resamples all source material to 192 kHz before sending to
# brutefir.  Useful for mixed-rate playlists.  Requires a resampler plugin
# (e.g. soxr) configured in mpd.conf.
audio_output {
        type "oss"
        name "DRC-resamp"
        device "/dev/dsp.play"
        format "192000:24:2"
        enabled "no"
        mixer_type        "none"
}

###################################
##Archphile Default Configuration##


follow_outside_symlinks         "yes"
follow_inside_symlinks  "yes"
db_file         "/var/mpd/mpd.db"
log_file        "/var/mpd/mpd.log"
pid_file        "/var/mpd/pid"
music_directory         "/var/mpd/musica"
# playlist_directory      "/var/mpd/playlists"
state_file      "/var/mpd/mpdstate"
user    "mpd"
bind_to_address         "0.0.0.0"
port    "6600"
log_level       "default"
volume_normalization    "no"
audio_buffer_size       "16384"
buffer_before_play      "20%"
filesystem_charset      "UTF-8"
id3v1_encoding  "UTF-8"
gapless_mp3_playback    "yes"
auto_update     "no"
mixer_type      "disabled"
group   "mpd"
max_connections "20"
restore_paused "yes"

# Output 1 — direct to DAC, no room correction
audio_output {
        type "oss"
        name "OKTO-DAC"
        device "/dev/dsp0"
        mixer_type        "none"
}

audio_output {
        enabled "no"
        type "oss"
        name "OKTO-DAC-0.05us_buf"
        device "/dev/dsp0"
        mixer_type        "none"
        buffer_time       "50000"
        period_time       "256000000"
}

# DRC outputs — brutefir loopback, one per native sample rate.
# drc.sh <position> <rate> restarts virtual_oss and brutefir at the matching
# rate, then enables the corresponding output below.

audio_output {
        type "oss"
        name "DRC-44100"
        device "/dev/dsp.play"
        format "44100:24:2"
        enabled "no"
        mixer_type        "none"
}

audio_output {
        type "oss"
        name "DRC-48000"
        device "/dev/dsp.play"
        format "48000:24:2"
        enabled "no"
        mixer_type        "none"
}

audio_output {
        type "oss"
        name "DRC-88200"
        device "/dev/dsp.play"
        format "88200:24:2"
        enabled "no"
        mixer_type        "none"
}

audio_output {
        type "oss"
        name "DRC-96000"
        device "/dev/dsp.play"
        format "96000:24:2"
        enabled "no"
        mixer_type        "none"
}

audio_output {
        type "oss"
        name "DRC-192000"
        device "/dev/dsp.play"
        format "192000:24:2"
        enabled "no"
        mixer_type        "none"
}

# DRC-resamp: MPD resamples all source material to 192 kHz before sending to
# brutefir.  Useful for mixed-rate playlists.  Requires a resampler plugin
# (e.g. soxr) configured in mpd.conf.
audio_output {
        type "oss"
        name "DRC-resamp"
        device "/dev/dsp.play"
        format "192000:24:2"
        enabled "no"
        mixer_type        "none"
}

## BruteFIR default settings — Linux / ALSA
## Copy to ~/.config/BruteFir/.brutefir_defaults
##
## Linux counterpart of brutefir_defaults.conf (FreeBSD / OSS).  Only the audio
## backend differs: input from the snd-aloop capture side (hw:1,1), output to the
## USB DAC (hw:0,0).  See etc/modules-load.d/snd-aloop.conf for the loopback.

float_bits: 64;             # internal floating-point precision (32 or 64)
filter_length: 32768,16;    # partition_size, num_partitions
                            # total filter = 32768 * 16 = 524288 samples ≈ 2.7 s
                            # reduce to e.g. 4096,4 for low-latency testing
overflow_warnings: true;    # print to stderr when clipping occurs
show_progress: true;        # print block counter to stderr
max_dither_table_size: 0;   # 0 = compute dither on-the-fly (saves RAM)
allow_poll_mode: false;     # OSS-only knob; not needed for ALSA
monitor_rate: false;        # do not print sample-rate drift
powersave: false;           # never pause
lock_memory: true;          # lock memory when real-time priority is set
sdf_length: -1;             # subsample filter half-length in samples (-1 = off)
safety_limit: 6;            # abort if output exceeds this many dB (0 = off)

# Path where brutefir looks for .bfio and .bflogic plugin files.
# Source builds install under /usr/local/lib/brutefir; distro packages use
# /usr/lib/brutefir — adjust to match your install.
modules_path: "/usr/local/lib/brutefir";

# Location of the main configuration file.  MANDATORY — only settable here,
# not in brutefir.conf.  Adjust the path to match your setup.
config_file: "$XDG_CONFIG_HOME/BruteFIR/brutefir.conf";
convolver_config: "$XDG_CONFIG_HOME/BruteFIR/brutefir_convolver";

## COEFF DEFAULTS ##

coeff {
	format: "TEXT";     # file format
	attenuation: 0.0;   # attenuation in dB
	blocks: -1;         # how long in blocks (-1 = full filter length)
	skip: 0;            # how many bytes to skip at start of file
	shared_mem: false;  # allocate in shared memory
};

## INPUT DEFAULTS ##

input {
	device: "alsa" {
		device: "hw:1,1";   # snd-aloop capture side (MPD plays into hw:1,0)
		ignore_xrun: true;
	};
	sample: "S32_LE";   # sample format — must match the loopback / MPD format
	channels: 2/0,1;    # number of open channels / which to use
	delay: 0,0;         # delay in samples for each channel
	maxdelay: -1;       # max delay for variable delays
	subdelay: 0,0;      # subsample delay in 1/100th sample for each channel
	mute: false,false;  # mute active on startup for each channel
};

## OUTPUT DEFAULTS ##

output {
	device: "alsa" {
		device: "hw:0,0";   # the USB DAC — adjust if it is not card 0
		ignore_xrun: true;
	};
	sample: "S32_LE";
	channels: 2/0,1;    # number of open channels / which to use
	delay: 0,0;         # delay in samples for each channel
	maxdelay: -1;       # max delay for variable delays
	subdelay: 0,0;      # subsample delay in 1/100th sample for each channel
	mute: false,false;  # mute active on startup for each channel
	# Dither: HP TPDF noise improves effective resolution when reducing bit
	# depth (e.g. 64-bit internal → 32-bit output).  Off by default.
	dither: false;
};

## FILTER DEFAULTS ##

filter {
	process: -1;        # process index to run in (-1 = auto)
	delay: 0;           # predelay in blocks
	crossfade: false;   # crossfade when coefficient is changed
};

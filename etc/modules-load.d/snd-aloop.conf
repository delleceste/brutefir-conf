# Linux: load the ALSA loopback module at boot so the DRC chain has a software
# loopback (the equivalent of FreeBSD virtual_oss /dev/dsp.play <-> /dev/dsp.loop).
#
# snd-aloop creates a "Loopback" card with two devices whose subdevices are
# cross-wired: whatever is played to device 0 appears as a capture stream on
# device 1.  In this setup the USB DAC is card 0 and the loopback is card 1, so:
#   MPD plays      -> hw:1,0   (DRC-native / DRC-resamp outputs in mpd.conf)
#   brutefir reads <- hw:1,1   (input in brutefir_defaults.linux.conf)
#   brutefir plays -> hw:0,0   (the DAC)
#
# Install to: /etc/modules-load.d/snd-aloop.conf
# (loaded as root at boot — the loopback is infrastructure, like virtual_oss.)
snd-aloop

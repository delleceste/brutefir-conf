# Start DRC when a USB audio interface is attached.
# Stop DRC when a USB device is detached, so the next plug-in re-triggers it.
# Install to: /usr/local/etc/devd/usb-audio-drc.conf
#
# The attach rule matches USB interface class 0x01 (audio).  If the detach rule
# is too broad for a host with many USB devices, add vendor/product matches for
# the DAC and reload devd.

notify 100 {
	match "system" "USB";
	match "subsystem" "INTERFACE";
	match "type" "ATTACH";
	match "intclass" "0x01";
	action "/usr/sbin/service drc_usb_audio onestart";
};

notify 100 {
	match "system" "USB";
	match "subsystem" "DEVICE";
	match "type" "DETACH";
	action "/usr/sbin/service drc_usb_audio onestop";
};
